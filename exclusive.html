<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>#chaoscore — Exclusive</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      color: white;
      background:
        radial-gradient(circle at 20% 15%, rgba(120, 0, 20, 0.24), transparent 36%),
        #080608;
    }
    main {
      width: min(420px, calc(100% - 32px));
      text-align: center;
      display: grid;
      gap: 16px;
    }
    img {
      width: 100%;
      border-radius: 24px;
      box-shadow: 0 22px 70px rgba(0,0,0,0.42);
    }
    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 8vw, 4rem);
      letter-spacing: -0.06em;
    }
    p {
      color: rgba(255,255,255,0.68);
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.16);
      color: white;
      background: rgba(255,255,255,0.06);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <img src="/assets/chaoscore-spotify-cover.jpg" alt="#chaoscore cover" />
    <h1>Coming soon</h1>
    <p>Contenuto esclusivo in arrivo.</p>
    <a href="./index.html">Torna al player</a>
  </main>
</body>
</html>
