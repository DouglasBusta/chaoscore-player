<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>User Submissions — Busta Files</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 0%, rgba(139,23,23,0.28), transparent 34%),
        radial-gradient(circle at 82% 12%, rgba(231,224,210,0.08), transparent 28%),
        linear-gradient(180deg, #0c0908 0%, #030303 72%);
      color: #e7e0d2;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    main {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .back-link,
    .account-icon-link {
      color: rgba(231,224,210,0.72);
      text-decoration: none;
      border: 1px solid rgba(231,224,210,0.18);
      border-radius: 999px;
      background: rgba(255,255,255,0.035);
    }

    .back-link {
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.68rem;
      padding: 10px 12px;
    }

    .account-icon-link {
      width: 36px;
      height: 36px;
      display: inline-grid;
      place-items: center;
    }

    .account-icon-link svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: rgba(231,224,210,0.82);
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .kicker {
      color: rgba(216,247,207,0.78);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.72rem;
      margin-bottom: 12px;
    }

    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(3.5rem, 12vw, 8rem);
      line-height: 0.82;
      letter-spacing: -0.09em;
      text-transform: uppercase;
      margin: 0 0 18px;
    }

    .intro {
      max-width: 660px;
      color: rgba(231,224,210,0.64);
      line-height: 1.65;
      margin-bottom: 22px;
      font-size: 0.88rem;
    }

    .search-wrap {
      border: 1px solid rgba(231,224,210,0.14);
      border-radius: 18px;
      padding: 12px;
      background: rgba(0,0,0,0.2);
      margin: 0 0 18px;
    }

    .search-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: rgba(231,224,210,0.58);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.62rem;
      margin-bottom: 8px;
    }

    #submission-search {
      width: 100%;
      border: 1px solid rgba(231,224,210,0.18);
      border-radius: 14px;
      background: rgba(255,255,255,0.045);
      color: #e7e0d2;
      padding: 13px 14px;
      font: inherit;
      outline: none;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .file-card {
      overflow: hidden;
      border: 1px solid rgba(231,224,210,0.16);
      border-radius: 12px;
      background: rgba(255,255,255,0.025);
      color: #e7e0d2;
      display: grid;
      grid-template-rows: 1fr auto;
      min-height: 360px;
    }

    .file-preview {
      width: 100%;
      height: 100%;
      min-height: 250px;
      object-fit: cover;
      display: block;
      cursor: pointer;
    }

    .file-info {
      display: grid;
      gap: 7px;
      padding: 9px 10px 10px;
      background: rgba(0,0,0,0.52);
      border-top: 1px solid rgba(231,224,210,0.08);
    }

    .badge {
      width: fit-content;
      border: 1px solid rgba(231,224,210,0.16);
      border-radius: 999px;
      padding: 3px 6px;
      color: rgba(231,224,210,0.68);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.5rem;
      line-height: 1;
      background: rgba(255,255,255,0.035);
    }

    .file-title {
      color: rgba(231,224,210,0.92);
      font-size: 0.68rem;
      line-height: 1.22;
      word-break: break-word;
    }

    .submitted {
      color: rgba(231,224,210,0.52);
      font-size: 0.58rem;
      line-height: 1.3;
    }

    .actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 2px;
    }

    .actions button {
      appearance: none;
      -webkit-appearance: none;
      border: 1px solid rgba(231,224,210,0.16);
      border-radius: 999px;
      background: rgba(255,255,255,0.035);
      color: rgba(231,224,210,0.72);
      font: inherit;
      font-size: 0.52rem;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 5px 7px;
      cursor: pointer;
      min-height: 21px;
    }

    .actions button.is-saved {
      color: rgba(216,247,207,0.92);
      border-color: rgba(216,247,207,0.32);
    }

    .empty {
      border: 1px dashed rgba(231,224,210,0.14);
      border-radius: 16px;
      padding: 18px;
      color: rgba(231,224,210,0.58);
      line-height: 1.5;
    }

    @media (max-width: 850px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 560px) {
      .grid { grid-template-columns: 1fr; }
      .file-card { min-height: 320px; }
    }
  </style>
  <link rel="stylesheet" href="/busta-mobile-desktopish.css?v=1">
</head>
<body>
  <main>
    <div class="topbar">
      <a class="back-link" href="/">← Back to Busta Files</a>
      <a id="account-icon-link" class="account-icon-link" href="/account" aria-label="My Account" title="My Account">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="8" r="3.2"></circle>
          <path d="M5.5 20c.8-4.2 3.1-6.3 6.5-6.3s5.7 2.1 6.5 6.3"></path>
        </svg>
      </a>
    </div>

    <div class="kicker">Other Busta Files / Subfolder</div>
    <h1>User<br>Submissions</h1>

    <div class="intro">
      Approved files submitted by Busta Files users. Each file has its own copyable link and can be saved to your account.
    </div>

    <div class="search-wrap">
      <div class="search-head">
        <span>Search User Submissions</span>
        <span id="search-count">0 results</span>
      </div>
      <input id="submission-search" type="search" placeholder="Search by title, filename, username..." autocomplete="off">
    </div>

    <section id="grid" class="grid">
      <div class="empty">Loading user submissions...</div>
    </section>
  </main>

  <script>
    const SUPABASE_URL = "https://giixvsfwsguudrvvbmkj.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Ae2dmdo-KYyNxcVntZg_2Q_xkWq5Bzm";

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    const grid = document.getElementById("grid");
    const searchInput = document.getElementById("submission-search");
    const searchCount = document.getElementById("search-count");
    const accountIconLink = document.getElementById("account-icon-link");

    let allFiles = [];
    let savedIds = new Set();

    function clean(value) {
      return String(value || "").trim();
    }

    function fileId(item) {
      return "user-submission:" + clean(item.file_url);
    }

    function publicFileKey(item) {
      return clean(item.id || item.file_name || item.title || item.file_url);
    }

    function perFileLink(item) {
      return window.location.origin + "/user-submissions?file=" + encodeURIComponent(publicFileKey(item));
    }

    function searchableText(item) {
      return [
        item.title,
        item.file_name,
        item.description,
        item.submitted_by_username,
        item.folder
      ].filter(Boolean).join(" ").toLowerCase();
    }

    async function getSession() {
      const result = await client.auth.getSession();
      return result.data?.session || null;
    }

    async function updateAccountIcon() {
      const session = await getSession();
      accountIconLink.href = session?.user ? "/account" : "/auth?mode=login";
      accountIconLink.title = session?.user ? "My Account" : "Log In";
      accountIconLink.setAttribute("aria-label", session?.user ? "My Account" : "Log In");
    }

    async function loadSavedIds() {
      const session = await getSession();
      if (!session?.user) {
        savedIds = new Set();
        return;
      }

      const result = await client.rpc("get_my_saved_files");

      if (result.error || !Array.isArray(result.data)) {
        savedIds = new Set();
        return;
      }

      savedIds = new Set(
        result.data
          .map(row => row.file_id || row.file_key || row.id)
          .filter(Boolean)
      );
    }

    async function saveItem(item, button) {
      const session = await getSession();

      if (!session?.user) {
        window.location.href = "/auth?mode=login";
        return;
      }

      button.disabled = true;
      button.textContent = "...";

      const id = fileId(item);

      const result = await client.rpc("save_busta_file", {
        p_file_id: id,
        p_file_title: clean(item.title || item.file_name || "User Submission"),
        p_file_type: "User Submission",
        p_file_url: clean(item.file_url),
        p_file_meta: perFileLink(item)
      });

      button.disabled = false;

      if (result.error) {
        button.textContent = "Save";
        alert("Save failed: " + result.error.message);
        return;
      }

      savedIds.add(id);
      button.dataset.saved = "1";
      button.classList.add("is-saved");
      button.textContent = "✓";
    }

    async function unsaveItem(item, button) {
      const session = await getSession();

      if (!session?.user) {
        window.location.href = "/auth?mode=login";
        return;
      }

      button.disabled = true;
      button.textContent = "...";

      const id = fileId(item);

      const result = await client.rpc("unsave_busta_file", {
        p_file_id: id
      });

      button.disabled = false;

      if (result.error) {
        button.textContent = "✓";
        alert("Remove failed: " + result.error.message);
        return;
      }

      savedIds.delete(id);
      button.dataset.saved = "0";
      button.classList.remove("is-saved");
      button.textContent = "Save";
    }

    async function copyShareLink(item, button) {
      const link = perFileLink(item);

      try {
        await navigator.clipboard.writeText(link);
        button.textContent = "Copied";
        setTimeout(() => {
          button.textContent = "Share";
        }, 900);
      } catch (_) {
        alert("Copy this link manually: " + link);
      }
    }

    function createCard(item) {
      const id = fileId(item);
      const isSaved = savedIds.has(id);
      const isImage = (item.file_type || "").startsWith("image/") || /\.(png|jpe?g|webp|gif)$/i.test(item.file_url || "");

      const card = document.createElement("article");
      card.className = "file-card";
      card.dataset.fileId = publicFileKey(item);

      const preview = isImage
        ? `<img class="file-preview" src="${clean(item.file_url)}" alt="">`
        : `<div class="file-preview empty">File</div>`;

      card.innerHTML = `
        ${preview}
        <div class="file-info">
          <div class="badge">Reviewed</div>
          <div class="file-title">${clean(item.title || item.file_name || "User Submission")}</div>
          <div class="submitted">Submitted by @${clean(item.submitted_by_username || "unknown")}</div>
          <div class="actions">
            <button class="save-button ${isSaved ? "is-saved" : ""}" type="button" data-saved="${isSaved ? "1" : "0"}">${isSaved ? "✓" : "Save"}</button>
            <button class="share-button" type="button">Share</button>
          </div>
        </div>
      `;

      const image = card.querySelector(".file-preview");
      const saveButton = card.querySelector(".save-button");
      const shareButton = card.querySelector(".share-button");

      image.addEventListener("click", () => {
        if (item.file_url) window.open(item.file_url, "_blank", "noopener,noreferrer");
      });

      saveButton.addEventListener("click", async (event) => {
        event.preventDefault();
        event.stopPropagation();

        if (saveButton.dataset.saved === "1") {
          await unsaveItem(item, saveButton);
        } else {
          await saveItem(item, saveButton);
        }
      });

      shareButton.addEventListener("click", async (event) => {
        event.preventDefault();
        event.stopPropagation();
        await copyShareLink(item, shareButton);
      });

      return card;
    }

    function renderFiles() {
      const query = clean(searchInput.value).toLowerCase();

      const files = query
        ? allFiles.filter(item => searchableText(item).includes(query))
        : allFiles;

      searchCount.textContent = files.length + " result" + (files.length === 1 ? "" : "s");

      grid.innerHTML = "";

      if (!files.length) {
        grid.innerHTML = `<div class="empty">No matching user submissions.</div>`;
        return;
      }

      files.forEach(item => grid.appendChild(createCard(item)));
    }

    async function load() {
      await updateAccountIcon();

      const result = await client
        .from("approved_busta_files")
        .select("*")
        .order("created_at", { ascending: false })
        .limit(100);

      if (result.error) {
        grid.innerHTML = `<div class="empty">Could not load user submissions: ${result.error.message}</div>`;
        return;
      }

      allFiles = result.data || [];

      await loadSavedIds();

      if (!allFiles.length) {
        searchCount.textContent = "0 results";
        grid.innerHTML = `<div class="empty">No user submissions approved yet.</div>`;
        return;
      }

      renderFiles();

      searchInput.addEventListener("input", renderFiles);

      const wanted = new URLSearchParams(window.location.search).get("file");

      if (wanted) {
        setTimeout(() => {
          const target = Array.from(document.querySelectorAll(".file-card")).find(card => {
            return card.dataset.fileId === wanted || decodeURIComponent(wanted) === card.dataset.fileId;
          });

          if (target) {
            target.scrollIntoView({ behavior: "smooth", block: "center" });
            target.style.outline = "2px solid rgba(216,247,207,0.7)";
            target.style.outlineOffset = "4px";
            setTimeout(() => {
              target.style.outline = "";
              target.style.outlineOffset = "";
            }, 2400);
          }
        }, 400);
      }
    }

    load();
  </script>
  <script src="/busta-actions-reset.js?v=2"></script>
</body>
</html>
