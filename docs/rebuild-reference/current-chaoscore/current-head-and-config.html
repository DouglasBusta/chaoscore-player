<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>#chaoscore — Douglas Busta</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#13070a" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #090608;
      --panel: rgba(255,255,255,0.055);
      --panel-2: rgba(255,255,255,0.085);
      --text: #fff;
      --muted: rgba(255,255,255,0.62);
      --soft: rgba(255,255,255,0.12);
      --red: #6f101a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 15%, rgba(120, 0, 20, 0.24), transparent 36%),
        radial-gradient(circle at 90% 75%, rgba(90, 0, 18, 0.18), transparent 38%),
        #080608;
    }

    button, a {
      font: inherit;
    }

    .shell {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 42px 0 128px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(240px, 340px) 1fr;
      gap: 36px;
      align-items: start;
    }

    .cover-wrap {
      width: 100%;
    }

    .cover-credit {
      margin: 10px 0 0;
      color: rgba(255,255,255,0.58);
      font-size: 0.88rem;
      text-align: center;
    }

    .cover {
      width: 100%;
      display: block;
      border-radius: 24px;
      box-shadow: 0 22px 70px rgba(0,0,0,0.42);
      background: rgba(255,255,255,0.05);
    }
    .cover-picker {
      margin-top: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
    }

    .cover-arrow {
      width: 38px;
      height: 38px;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 999px;
      color: rgba(255,255,255,0.72);
      background: rgba(255,255,255,0.035);
      cursor: pointer;
      font-size: 1.7rem;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding-bottom: 3px;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .cover-arrow:hover {
      background: rgba(255,255,255,0.10);
      color: #fff;
      transform: scale(1.04);
    }

    .cover-current {
      display: none;
    }

.install-buttons {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .clean-button {
      border: 1px solid var(--soft);
      border-radius: 14px;
      min-height: 44px;
      padding: 10px 12px;
      color: var(--text);
      background: rgba(16, 14, 16, 0.78);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .clean-button:hover {
      background: rgba(255,255,255,0.095);
    }


    .quality-downloads {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .quality-button {
      min-height: 42px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.13);
      color: rgba(255,255,255,0.88);
      background: rgba(255,255,255,0.045);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 650;
      text-align: center;
    }

    .quality-button:hover {
      color: #fff;
      background: rgba(255,255,255,0.09);
    }

    .info {
      padding-top: 8px;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
      margin-bottom: 14px;
    }

    .pill {
      border: 1px solid var(--soft);
      border-radius: 999px;
      padding: 9px 13px;
      color: var(--text);
      background: rgba(255,255,255,0.06);
      cursor: pointer;
      text-decoration: none;
      font-size: 0.92rem;
    }

    .pill:hover {
      background: rgba(255,255,255,0.11);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.65rem, 7vw, 5.4rem);
      letter-spacing: -0.08em;
      line-height: 0.86;
    }

    .artist {
      margin: 10px 0 0;
      color: var(--text);
      font-weight: 650;
    }

    .by {
      margin: 4px 0 24px;
      color: var(--muted);
    }

    .tracks {
      display: grid;
      gap: 8px;
      margin-top: 24px;
    }

    .track {
      display: grid;
      grid-template-columns: 36px 42px 1fr auto;
      align-items: center;
      gap: 10px;
      min-height: 58px;
      border: 1px solid rgba(255,255,255,0.075);
      border-radius: 16px;
      padding: 8px 12px;
      background: rgba(255,255,255,0.042);
