  <script id="chaoscore-persistent-player">
    (() => {
      if (window.__chaoscorePersistentPlayerMounted) return;
      window.__chaoscorePersistentPlayerMounted = true;

      let sheetState = "compact";
      let startY = 0;
      let startState = "compact";
      let dragging = false;

      function audio() {
        return document.getElementById("audio");
      }

      function player() {
        return document.querySelector(".player");
      }

      function buildShell() {
        if (document.getElementById("chaos-files-shell")) return;

        const shell = document.createElement("div");
        shell.id = "chaos-files-shell";
        shell.className = "chaos-files-shell";
        shell.innerHTML = `<iframe class="chaos-files-frame" id="chaos-files-frame" src="about:blank" title="Busta Files"></iframe>`;

        const topbar = document.createElement("div");
        topbar.className = "chaos-files-topbar";
        topbar.innerHTML = `<button class="chaos-files-back" id="chaos-files-back" type="button">← Back to #chaoscore</button>`;

        document.body.appendChild(shell);
        document.body.appendChild(topbar);

        const frame = document.getElementById("chaos-files-frame");
        if (frame) {
          frame.addEventListener("load", () => {
            prepareFilesFrame();
            setTimeout(prepareFilesFrame, 250);
            setTimeout(prepareFilesFrame, 900);
          });
        }
      }

      function prepareRealPlayer() {
        const p = player();
        if (!p || p.dataset.sheetReady === "1") return;

        p.dataset.sheetReady = "1";

        const handle = document.createElement("div");
        handle.className = "chaos-player-handle";
        handle.setAttribute("aria-hidden", "true");
        p.insertBefore(handle, p.firstChild);

        if (!p.querySelector(".chaos-player-volume")) {
          const volume = document.createElement("label");
          volume.className = "chaos-player-volume";
          volume.innerHTML = `<span>VOL</span><input id="chaos-player-volume" type="range" min="0" max="1" step="0.01" value="1">`;
          p.appendChild(volume);
        }

        bindDrag(handle, p);
        bindPlayerExtras();
      }

      function bindPlayerExtras() {
        const volume = document.getElementById("chaos-player-volume");
        const a = audio();

        if (volume && !volume.dataset.bound) {
          volume.dataset.bound = "1";
          volume.addEventListener("input", event => {
            const realAudio = audio();
            if (realAudio) realAudio.volume = Number(event.target.value);
          });
        }

        const wave = document.getElementById("wave");
        if (wave && !wave.dataset.seekBound) {
          wave.dataset.seekBound = "1";
          wave.addEventListener("click", event => {
            if (sheetState !== "expanded") return;

            const realAudio = audio();
            if (!realAudio || !Number.isFinite(realAudio.duration) || !realAudio.duration) return;

            const rect = wave.getBoundingClientRect();
            const ratio = Math.min(1, Math.max(0, (event.clientX - rect.left) / rect.width));
            realAudio.currentTime = ratio * realAudio.duration;
          });
        }

        if (a && !a.dataset.sheetSyncBound) {
          a.dataset.sheetSyncBound = "1";
          ["volumechange", "play", "pause", "timeupdate", "loadedmetadata"].forEach(type => {
            a.addEventListener(type, syncSheet);
          });
        }

        syncSheet();
      }

      function syncSheet() {
        const a = audio();
        const volume = document.getElementById("chaos-player-volume");

        if (a && volume && document.activeElement !== volume) {
          volume.value = String(a.volume);
        }

        if ("mediaSession" in navigator) {
          const title = document.getElementById("now-title")?.textContent?.trim() || "#chaoscore";
          const cover = document.getElementById("main-cover")?.src || "/chaoscore-cover.png";

          try {
            navigator.mediaSession.metadata = new MediaMetadata({
              title,
              artist: "Douglas Busta",
              album: "#chaoscore",
              artwork: [{ src: cover, sizes: "512x512", type: "image/png" }]
            });

            navigator.mediaSession.setActionHandler("play", () => audio()?.play());
            navigator.mediaSession.setActionHandler("pause", () => audio()?.pause());
            navigator.mediaSession.setActionHandler("previoustrack", () => document.getElementById("prev")?.click());
            navigator.mediaSession.setActionHandler("nexttrack", () => document.getElementById("next")?.click());
          } catch (_) {}
        }
      }

      function bindDrag(handle, p) {
        if (!handle || !p || handle.dataset.dragBound === "1") return;
        handle.dataset.dragBound = "1";

        handle.addEventListener("pointerdown", event => {
          if (!document.documentElement.classList.contains("chaos-files-open")) return;

          dragging = true;
          startY = event.clientY;
          startState = sheetState;
          handle.setPointerCapture(event.pointerId);
          p.style.transition = "none";
        });

        handle.addEventListener("pointermove", event => {
          if (!dragging) return;

          const delta = event.clientY - startY;
          const compactHeight = 88;
          const expandedHeight = Math.min(430, window.innerHeight - 34);
          const base = startState === "expanded" ? expandedHeight : compactHeight;
          const next = Math.min(expandedHeight, Math.max(compactHeight, base - delta));

          p.style.height = `${next}px`;
        });

        handle.addEventListener("pointerup", event => {
          if (!dragging) return;

          dragging = false;
          handle.releasePointerCapture(event.pointerId);
          p.style.transition = "";

          const delta = event.clientY - startY;

          if (delta < -34) {
            setSheetState("expanded");
          } else if (delta > 34) {
            setSheetState("compact");
          } else {
            setSheetState(startState);
          }
        });

        handle.addEventListener("dblclick", () => {
          setSheetState(sheetState === "expanded" ? "compact" : "expanded");
        });
      }

      function setSheetState(state) {
        const p = player();
        if (!p) return;

        sheetState = state === "expanded" ? "expanded" : "compact";

        p.style.height = "";
        p.classList.add("chaos-player-sheet");
        p.classList.toggle("chaos-player-compact", sheetState === "compact");
        p.classList.toggle("chaos-player-expanded", sheetState === "expanded");

        prepareFilesFrame();
      }

      function prepareFilesFrame() {
        const frame = document.getElementById("chaos-files-frame");
        const p = player();
        if (!frame || !p) return;

        try {
          const doc = frame.contentDocument;
          if (!doc) return;

          let style = doc.getElementById("chaos-frame-player-padding");
          if (!style) {
            style = doc.createElement("style");
            style.id = "chaos-frame-player-padding";
            doc.head.appendChild(style);
          }

          const height = sheetState === "expanded" ? 470 : 132;

          style.textContent = `
            body {
              padding-bottom: ${height}px !important;
            }
          `;
        } catch (_) {}
      }

      function openFilesView(push = true) {
        buildShell();
        prepareRealPlayer();

        const shell = document.getElementById("chaos-files-shell");
        const frame = document.getElementById("chaos-files-frame");

        if (!shell || !frame) return;

        if (frame.getAttribute("src") === "about:blank") {
          frame.src = "/exclusive";
        }

        shell.classList.add("is-open");
        document.documentElement.classList.add("chaos-files-open");
        setSheetState("compact");

        if (push) {
          const url = new URL(window.location.href);
          url.searchParams.set("view", "files");
          history.pushState({ chaosView: "files" }, "", url);
        }
      }

      function closeFilesView(push = true) {
        const shell = document.getElementById("chaos-files-shell");
        const p = player();

        if (shell) shell.classList.remove("is-open");
        document.documentElement.classList.remove("chaos-files-open");

        if (p) {
          p.classList.remove("chaos-player-sheet", "chaos-player-compact", "chaos-player-expanded");
          p.style.height = "";
          p.style.transition = "";
        }

        if (push) {
          const url = new URL(window.location.href);
          url.searchParams.delete("view");
          history.pushState({ chaosView: "album" }, "", url);
        }
      }

      function bindNavigation() {
        buildShell();
        prepareRealPlayer();

        document.addEventListener("click", event => {
          const link = event.target.closest("a");
          if (!link) return;

          const href = link.getAttribute("href") || "";
          const text = (link.textContent || "").toLowerCase();

          const isBackToFiles =
            link.classList.contains("chaoscore-back-to-files") ||
            text.includes("back to busta files") ||
            href === "/" ||
            href === "/exclusive" ||
            href === "/exclusive.html";

          if (!isBackToFiles) return;
