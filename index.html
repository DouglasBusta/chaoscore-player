<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Archivio privato #chaoscore."
    />
    <meta
      name="robots"
      content="noindex, nofollow, noarchive, nosnippet, noimageindex"
    />
    <meta name="theme-color" content="#171717" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="#chaoscore" />
    <title>#chaoscore</title>
    <link rel="icon" href="./assets/chaoscore-spotify-cover.jpg" />
    <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="player-page">
    <main class="player-shell">
      <section class="album-column">
        <img
          class="album-art"
          src="./assets/chaoscore-spotify-cover.jpg"
          alt="Cover di #chaoscore"
        />
        <div class="install-panel">
          <button class="install-action" id="install-android" type="button">
            installa android
          </button>
          <button class="install-action" id="install-ios" type="button">
            installa ios
          </button>
          <button class="install-action install-download" id="content-info" type="button">
            contenuto privato
          </button>
        </div>
      </section>

      <section class="library-column">
        <header class="library-head">
          <div>
            <h1>#chaoscore</h1>
            <p class="album-meta" id="album-meta">
              DouglasBusta · 15 tracks · 37m 49s
            </p>
          </div>

          <div class="head-actions">
            <a class="nav-pill" href="./exclusive.html">exclusive</a>
            <a class="nav-pill" href="./credits.html">credits</a>
            <button
              class="hero-play"
              id="hero-play"
              type="button"
              aria-label="Riproduci o metti in pausa"
            >
              ▶
            </button>
          </div>
        </header>

        <div class="library-actions">
          <button class="playlist-bar" id="copy-link" type="button">
            + copia link privato
          </button>
          <button class="playlist-bar playlist-download" id="content-info-secondary" type="button">
            contenuto in arrivo
          </button>
        </div>

        <section class="tracks-panel" aria-label="Tracklist completa">
          <div class="track-list" id="track-list"></div>
        </section>
      </section>
    </main>

    <section class="mini-player">
      <audio id="audio-player" preload="metadata"></audio>

      <div class="mini-player-main">
        <div class="mini-player-track">
          <img
            class="mini-player-art"
            src="./assets/chaoscore-spotify-cover.jpg"
            alt="Cover mini player"
          />
          <div class="mini-player-copy">
            <h2 id="now-title">1. banale</h2>
            <p id="now-subtitle">#chaoscore</p>
          </div>
        </div>

        <button
          class="waveform-wrap"
          id="waveform-wrap"
          type="button"
          aria-label="Sposta la riproduzione nella traccia"
        >
          <div class="waveform" id="waveform"></div>
        </button>

        <div class="time-readout" id="time-readout">0:00 / 0:00</div>

        <div class="mini-player-controls">
          <button type="button" data-action="prev" class="control-button">⏮</button>
          <button type="button" data-action="play" class="control-button play-button">▶</button>
          <button type="button" data-action="next" class="control-button">⏭</button>
          <button type="button" data-action="shuffle" class="icon-button">⤮</button>
          <button type="button" data-action="repeat" class="icon-button">↻</button>
          <button type="button" id="menu-button" class="icon-button">☰</button>
          <div class="volume-cluster">
            <button type="button" id="mute-button" class="icon-button">🔊</button>
            <input
              id="volume-slider"
              class="volume-slider"
              type="range"
              min="0"
              max="100"
              value="100"
              aria-label="Volume"
            />
          </div>
        </div>

        <button class="download-link" id="content-info-mini" type="button">
          contenuto
        </button>
      </div>

      <input id="seekbar" type="range" min="0" max="100" value="0" hidden />
      <div class="waveform-tooltip" id="waveform-tooltip" hidden>0:00</div>
    </section>

    <div class="install-sheet" id="install-sheet" hidden>
      <div class="install-card">
        <h2 id="install-title">Installa #chaoscore</h2>
        <p id="install-copy">
          Su iPhone apri Safari, tocca Condividi e poi “Aggiungi alla schermata Home”.
        </p>
        <div class="install-sheet-actions">
          <button class="playlist-bar install-close" id="install-close" type="button">
            chiudi
          </button>
        </div>
      </div>
    </div>

    <script src="./data/library.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
