<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>#chaoscore — Douglas Busta</title>

  <meta name="theme-color" content="#13070a" />

<body>
  <main class="shell">
    <section class="hero">
      <div class="cover-wrap">
        <img class="cover" id="main-cover" src="/chaoscore-cover.png" alt="#chaoscore cover" />
        <p class="cover-credit">Cover by @tuma.zz</p>
        <div class="cover-picker" id="cover-picker">
          <button class="cover-arrow" id="cover-prev" type="button" aria-label="Previous cover">‹</button>
          <span class="cover-current" id="cover-current" aria-hidden="true"></span>
          <button class="cover-arrow" id="cover-next" type="button" aria-label="Next cover">›</button>
        </div>

        <div class="install-buttons">
          <button class="clean-button" id="ios-download"> Download iOS</button>
          <button class="clean-button" id="android-download">🤖 Download Android</button>
        </div>
        <div class="quality-downloads">
          <a class="quality-button" href="https://drive.google.com/drive/folders/1058oD--H9tKeTxN4ukLf_qZDHjH1gJqB?usp=drive_link" target="_blank" rel="noopener noreferrer">
            Download
          </a>
        </div>
      </div>

      <div class="info">
        <div class="top-actions">
          <a class="pill" href="/exclusive">exclusive</a>
          <button class="pill" id="album-credits">credits</button>
          <button class="round" id="hero-play">▶</button>
        </div>

        <h1>#chaoscore</h1>
        <p class="by">By Douglas Busta</p>

        <div class="tracks" id="tracks"></div>
      </div>
    </section>
  </main>

  <section class="player">
    <div class="now">
      <img src="/chaoscore-cover.png" alt="" />
      <div>
        <div class="now-title" id="now-title">banale</div>
        <div class="now-sub">#chaoscore</div>
      </div>
    </div>

    <div class="wave" id="wave"></div>

    <div class="controls">
      <button class="round secondary" id="prev">‹</button>
      <button class="round" id="play">▶</button>
      <button class="round secondary" id="next">›</button>
      <div class="time" id="time">0:00 / 0:00</div>
    </div>
  </section>

  <audio id="audio" preload="metadata"></audio>

  <dialog id="modal">
    <div class="modal-inner">
      <div id="modal-close-circle"
        aria-label="Close panel"
        role="button"
        tabindex="0"
        onclick="this.closest('dialog').close()"
        onkeydown="if(event.key === 'Enter' || event.key === ' '){ event.preventDefault(); this.closest('dialog').close(); }">
        <span class="modal-close-line line-a"></span>
        <span class="modal-close-line line-b"></span>
      </div>
      <h2 id="modal-title"></h2>
      <p id="modal-text"></p>
      <button class="clean-button" id="modal-close">chiudi</button>
    </div>
  </dialog>

      { title: "so ki 6... ft. 39Redboy", file: "/audio-flac/04-so-ki-6-ft-39redboy.flac", credits: "Lyrics written by Douglas Busta and 39Redboy.\nProduced by Douglas Busta.\nMixed and mastered by Douglas Busta." },
      { title: "sono triste e caco.", file: "/audio-flac/05-sono-triste-e-caco.flac", credits: "Lyrics written by Douglas Busta.\nProduced by Douglas Busta.\nMixed and mastered by Douglas Busta." },
      { title: "blue hair", file: "/audio-flac/06-blue-hair.flac", credits: "Lyrics written by Douglas Busta.\nProduced by Douglas Busta.\nMixed and mastered by Douglas Busta." },
      { title: "piccolo ME", file: "/audio-flac/07-piccolo-me.flac", credits: "Lyrics written by Douglas Busta.\nProduced by Douglas Busta.\nMixed and mastered by Douglas Busta." },

      { title: "Stop the EMOTIONS", file: "/audio-flac/09-stop-the-emotions.flac", credits: "Lyrics written by Douglas Busta.\nProduced by Douglas Busta.\nMixed and mastered by Douglas Busta." },
      { title: "sensibileh! ft. Deffy", file: "/audio-flac/10-sensibileh-ft-deffy.flac", credits: "Lyrics written by Douglas Busta and Deffy.\nProduced by Douglas Busta.\nMixed and mastered by Douglas Busta." },
      { title: "ma che ho fatto mo??...", file: "/audio-flac/11-ma-che-ho-fatto-mo.flac", credits: "Lyrics written by Douglas Busta.\nProduced by Douglas Busta.\nMixed and mastered by Douglas Busta." },
      { title: "NO TIME!", file: "/audio-flac/12-no-time.flac", credits: "Lyrics written by Douglas Busta.\nProduced by Douglas Busta.\nMixed and mastered by Douglas Busta." },
      { title: "GET OUT!", file: "/audio-flac/13-get-out.flac", credits: "Lyrics written by Douglas Busta.\nProduced by Douglas Busta.\nMixed and mastered by Douglas Busta." },
      { title: "LOOK UP!", file: "/audio-flac/14-look-up.flac", credits: "Lyrics written by Douglas Busta.\nProduced by Douglas Busta.\nMixed and mastered by Douglas Busta." },
      { title: "1 normale (Bonus Track)", file: "/audio-flac/15-1-normale-bonus-track.flac", credits: "Lyrics written by Douglas Busta.\nProduced by Douglas Busta.\nMixed and mastered by Douglas Busta." }
    ];

    const audio = document.getElementById("audio");
    const tracksEl = document.getElementById("tracks");
    const nowTitle = document.getElementById("now-title");
    const play = document.getElementById("play");
    const heroPlay = document.getElementById("hero-play");
    const prev = document.getElementById("prev");
    const next = document.getElementById("next");
    const time = document.getElementById("time");
    const wave = document.getElementById("wave");
    const modal = document.getElementById("modal");
    const modalTitle = document.getElementById("modal-title");
    const modalText = document.getElementById("modal-text");
    const modalClose = document.getElementById("modal-close");

    let current = 0;


    function applyCover(src) {
      const finalSrc = src || coverOptions[0]?.src || "/chaoscore-cover.png";

      document.querySelectorAll(".cover, .now img").forEach((img) => {
        img.src = finalSrc;
      });

      localStorage.setItem("chaoscore-selected-cover", finalSrc);

      document.querySelectorAll(".cover-option").forEach((button) => {
        button.classList.toggle("active", button.dataset.src === finalSrc);
      });
    }

    function renderCoverPicker() {
      const picker = document.getElementById("cover-picker");
      if (!picker) return;

      picker.innerHTML = "";

      coverOptions.forEach((cover, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "cover-option";
        button.dataset.src = cover.src;
        button.textContent = cover.label || `Cover ${index + 1}`;
        button.addEventListener("click", () => applyCover(cover.src));
        picker.appendChild(button);
      });

      const saved = localStorage.getItem("chaoscore-selected-cover");
      applyCover(saved || coverOptions[0]?.src);
    }

    function fmt(seconds) {
      if (!Number.isFinite(seconds)) return "0:00";
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60).toString().padStart(2, "0");
      return `${m}:${s}`;
    }

    function popup(title, text, isHtml = false) {
      modalTitle.textContent = title;

      if (isHtml) {
        modalText.innerHTML = text;
      } else {
        modalText.textContent = text;
      }

      modal.showModal();
    }

    modalClose.addEventListener("click", () => modal.close());

    function renderWave(progress = 0) {
      const heights = [18,24,32,45,58,74,88,66,52,41,69,83,77,56,35,22,31,49,73,92,85,61,44,38,57,79,95,82,64,47,29,21,38,54,72,90,69,44,30,18];
      wave.innerHTML = "";
      heights.forEach((h, i) => {
        const bar = document.createElement("span");
        bar.className = "bar";
        bar.style.setProperty("--h", h / 100);
        if (i / heights.length <= progress) bar.classList.add("on");
        wave.appendChild(bar);
      });
    }

    function loadTrack(index, shouldPlay = false) {
      current = index;
      const track = tracks[current];
      audio.src = track.file;
      audio.load();
      nowTitle.textContent = track.title;

      document.querySelectorAll(".track").forEach((el, i) => {
        el.classList.toggle("active", i === current);
      });

      renderWave(0);
    updateTrackPlayButtons();

      if (shouldPlay) {
        audio.play().catch(() => popup("Audio", "Riprova cliccando Play o cliccando la traccia."));
      }
    }

    function renderTracks() {
      tracksEl.innerHTML = "";

      tracks.forEach((track, index) => {
        const row = document.createElement("article");
        row.className = "track";
        if (index === current) row.classList.add("active");

        row.innerHTML = `
          <div class="num">${index + 1}</div>
          <button class="play-small">▶</button>
          <div>
            <div class="track-title"></div>
            <div class="track-sub">Douglas Busta</div>
          </div>
          <button class="credit-link">credits</button>
        `;

        row.querySelector(".track-title").textContent = track.title;

        row.addEventListener("click", () => loadTrack(index, true));

        row.querySelector(".play-small").addEventListener("click", (event) => {
          event.stopPropagation();
          loadTrack(index, true);
        });

        row.querySelector(".credit-link").addEventListener("click", (event) => {
          event.stopPropagation();
          popup("Credits — " + track.title, track.credits);
        });

        tracksEl.appendChild(row);
      });
    }

    function togglePlay() {
      if (!audio.src) loadTrack(current, false);

      if (audio.paused) {
        audio.play().catch(() => popup("Audio", "Riprova cliccando una traccia."));
      } else {
        audio.pause();
      }
    }

    play.addEventListener("click", togglePlay);
    heroPlay.addEventListener("click", togglePlay);

    prev.addEventListener("click", () => {
      const nextIndex = (current - 1 + tracks.length) % tracks.length;
      loadTrack(nextIndex, true);
    });

    next.addEventListener("click", () => {
      const nextIndex = (current + 1) % tracks.length;
      loadTrack(nextIndex, true);
    });

    audio.addEventListener("play", () => {
      play.textContent = "❚❚";
      heroPlay.textContent = "❚❚";
          updateTrackPlayButtons();
    });

    audio.addEventListener("pause", () => {
      play.textContent = "▶";
      heroPlay.textContent = "▶";
          updateTrackPlayButtons();
    });

    audio.addEventListener("timeupdate", () => {
      const progress = audio.duration ? audio.currentTime / audio.duration : 0;
      renderWave(progress);
      time.textContent = `${fmt(audio.currentTime)} / ${fmt(audio.duration)}`;
    });

    audio.addEventListener("ended", () => {
      const nextIndex = (current + 1) % tracks.length;
      loadTrack(nextIndex, true);
    });

    wave.addEventListener("click", (event) => {
      if (!audio.duration) return;
      const rect = wave.getBoundingClientRect();
      const ratio = Math.min(Math.max((event.clientX - rect.left) / rect.width, 0), 1);
      audio.currentTime = ratio * audio.duration;
    });

    document.getElementById("album-credits").addEventListener("click", () => {
      popup("Credits", `
        <div class="credits-roll">
          <div class="credits-block">
            <div class="credits-role">Album</div>
            <div class="credits-name">#chaoscore</div>
          </div>

          <div class="credits-block">
            <div class="credits-role">All Lyrics Written By</div>
            <div class="credits-name">Douglas Busta</div>
          </div>

          <div class="credits-block">
            <div class="credits-role">All Tracks Produced and Composed By</div>
            <div class="credits-name">Douglas Busta</div>
          </div>

          <div class="credits-block">
            <div class="credits-role">Recorded By</div>
            <div class="credits-name">Douglas Busta</div>
          </div>

          <div class="credits-block">
            <div class="credits-role">Mixed and Mastered By</div>
            <div class="credits-name">Douglas Busta</div>
          </div>

          <div class="credits-block">
            <div class="credits-role">Track 4 — so ki 6... ft. 39Redboy</div>
            <div class="credits-name">
              Additional lyrics by 39Redboy
              <a class="credits-feature-tag" href="https://instagram.com/39redboy" target="_blank" rel="noopener noreferrer">@39redboy</a>
            </div>
          </div>

          <div class="credits-block">
            <div class="credits-role">Track 8 — Patto d'Achille ft. Gador</div>
            <div class="credits-name">
              Additional lyrics and production by Gador
              <a class="credits-feature-tag" href="https://instagram.com/ohmygador" target="_blank" rel="noopener noreferrer">@ohmygador</a>
            </div>
          </div>

          <div class="credits-block">
            <div class="credits-role">Track 10 — sensibileh! ft. Deffy</div>
            <div class="credits-name">
              Additional lyrics by Deffy
              <a class="credits-feature-tag" href="https://instagram.com/dd_deffy" target="_blank" rel="noopener noreferrer">@dd_deffy</a>
            </div>
          </div>

          <div class="credits-block">
            <div class="credits-role">Executive Producer</div>
            <div class="credits-name">Douglas Busta</div>
          </div>

          <div class="credits-block">
            <div class="credits-role">Direction</div>
            <div class="credits-name">Douglas Busta</div>
          </div>

          <div class="credits-block">
            <div class="credits-role">Cover</div>
            <div class="credits-name">
              Matteo Mazzetti
              <a href="https://instagram.com/tuma.zz" target="_blank" rel="noopener noreferrer">@tuma.zz</a>
              <br>
              Douglas Busta
            </div>
          </div>

          <div class="credits-block">
            <div class="credits-role">Video Sound Design</div>
            <div class="credits-name">Douglas Busta</div>
          </div>

          <div class="credits-block credits-tight">
            <div class="credits-role">Video Editing, Color and Camera</div>
            <div class="credits-name">
              Nicola Vitali
              <a href="https://instagram.com/vitali.mp4" target="_blank" rel="noopener noreferrer">@vitali.mp4</a>
            </div>
          </div>

          <div class="credits-block">
            <div class="credits-role">Video AI Prompter</div>
            <div class="credits-name">Douglas Busta</div>
          </div>

          <div class="credits-block">
            <div class="credits-role">Management and Label</div>
            <div class="credits-name">
              Giacomo (KAMI) Andreoli
              <a href="https://instagram.com/lovekxmi" target="_blank" rel="noopener noreferrer">@lovekxmi</a>
              <br>
              KYMA Label
              <a href="https://instagram.com/kyma_label" target="_blank" rel="noopener noreferrer">@kyma_label</a>
            </div>
          </div>

          <div class="credits-block">
            <div class="credits-role">Publishing</div>
            <div class="credits-name">
              KYMA Label
              <a href="https://instagram.com/kyma_label" target="_blank" rel="noopener noreferrer">@kyma_label</a>
            </div>
          </div>

          <div class="credits-block">
            <div class="credits-role">Original Idea</div>
            <div class="credits-name">Douglas Busta</div>
          </div>
        </div>
      `, true);
    });

    document.getElementById("ios-download").addEventListener("click", () => {
      popup("Download iOS", "Su iPhone apri questo sito in Safari, tocca Condividi e poi “Aggiungi alla schermata Home”.");
    });

    document.getElementById("android-download").addEventListener("click", () => {
      popup("Download Android", "Su Android apri il menu di Chrome e scegli “Installa app” oppure “Aggiungi a schermata Home”.");
    });

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations().then((regs) => regs.forEach((reg) => reg.unregister())).catch(() => {});
    }

    if ("caches" in window) {
      caches.keys().then((keys) => keys.forEach((key) => caches.delete(key))).catch(() => {});
    }

    renderCoverPicker();
    renderTracks();
    renderWave(0);
    loadTrack(0, false);

  
    // Real circle modal close
    function closeModalPanel() {
      if (!modal || !modal.open) return;

      modal.classList.add("modal-closing");

      window.setTimeout(() => {
        modal.close();
        modal.classList.remove("modal-closing");
      }, 160);
    }

    document.addEventListener("click", (event) => {
      const closeCircle = event.target.closest("#modal-close-circle");
      if (!closeCircle) return;

      event.preventDefault();
      event.stopPropagation();

      closeModalPanel();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") return;

      const closeCircle = event.target.closest("#modal-close-circle");
      if (!closeCircle) return;

      event.preventDefault();
      closeModalPanel();
    });

  </script>



<script>
/* FINAL MINI PLAYER + WAVEFORM FIX */
(function () {
  const tracks = [
    { title: "banale", file: "/audio-flac/01-banale.flac" },
    { title: "STAR II", file: "/audio-flac/02-star-ii.flac" },
    { title: "stella vera reale.wav", file: "/audio-flac/03-stella-vera-reale.flac" },
    { title: "so ki 6... ft. 39Redboy", file: "/audio-flac/04-so-ki-6-ft-39redboy.flac" },
    { title: "sono triste e caco.", file: "/audio-flac/05-sono-triste-e-caco.flac" },
    { title: "blue hair", file: "/audio-flac/06-blue-hair.flac" },
    { title: "piccolo ME", file: "/audio-flac/07-piccolo-me.flac" },
    { title: "Patto d'Achille ft. Gador", file: "/audio-flac/08-patto-d-achille-ft-gador.flac" },
    { title: "Stop the EMOTIONS", file: "/audio-flac/09-stop-the-emotions.flac" },
    { title: "sensibileh! ft. Deffy", file: "/audio-flac/10-sensibileh-ft-deffy.flac" },
    { title: "ma che ho fatto mo??...", file: "/audio-flac/11-ma-che-ho-fatto-mo.flac" },
    { title: "NO TIME!", file: "/audio-flac/12-no-time.flac" },
    { title: "GET OUT!", file: "/audio-flac/13-get-out.flac" },
    { title: "LOOK UP!", file: "/audio-flac/14-look-up.flac" },
    { title: "1 normale (Bonus Track)", file: "/audio-flac/15-1-normale-bonus-track.flac" }
  ];

  const wavePatterns = [
    [18,24,32,45,58,74,88,66,52,41,69,83,77,56,35,22,31,49,73,92,85,61,44,38,57,79,95,82,64,47,29,21,38,54,72,90,69,44,30,18],
    [40,52,63,72,41,29,58,84,91,66,36,24,44,70,88,76,55,39,28,35,61,83,96,71,48,31,23,42,67,89,80,59,33,25,47,73,92,64,38,20],
    [22,28,44,67,91,86,60,34,25,37,59,78,94,88,62,41,29,23,35,54,75,97,82,57,36,26,30,49,69,90,84,63,40,27,21,39,61,79,58,33],
    [64,38,25,31,56,83,96,71,45,29,22,48,77,91,68,42,30,53,87,94,73,51,35,24,44,69,89,78,57,36,28,50,81,93,66,43,32,55,76,48],
    [20,21,25,31,44,68,92,95,73,48,29,24,36,55,79,90,61,39,27,34,52,74,88,69,46,30,22,28,43,65,84,76,53,35,26,32,47,70,91,58]
  ];

  let activeIndex = 0;

  function absoluteUrl(path) {
    return new URL(path, window.location.origin).href;
  }

  function getAudio() {
    return document.getElementById("audio");
  }

  function getRows() {
    return Array.from(document.querySelectorAll(".track"));
  }

  function getIndexFromAudio() {
    const audio = getAudio();
    if (!audio || !audio.src) return activeIndex;

    const found = tracks.findIndex((track) => audio.src === absoluteUrl(track.file));
    return found >= 0 ? found : activeIndex;
  }

  function fmt(seconds) {
    if (!Number.isFinite(seconds)) return "0:00";
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60).toString().padStart(2, "0");
    return `${m}:${s}`;
  }

  function setMiniPlayer(index) {
    const track = tracks[index];
    if (!track) return;

    const nowTitle = document.getElementById("now-title");
    const nowSubtitle = document.querySelector(".now-sub");

    if (nowTitle) nowTitle.textContent = track.title;
    if (nowSubtitle) nowSubtitle.textContent = "#chaoscore";
  }

  function renderWave(index, progress = 0) {
    const wave = document.getElementById("wave");
    if (!wave) return;

    const pattern = wavePatterns[index % wavePatterns.length];
    wave.innerHTML = "";

    pattern.forEach((height, i) => {
      const bar = document.createElement("span");
      bar.className = "bar";
      bar.style.setProperty("--h", height / 100);

      if (i / pattern.length <= progress) {
        bar.classList.add("on");
      }

      wave.appendChild(bar);
    });
  }

  function animateRow(row, className) {
    if (!row) return;
    row.classList.remove("play-pop", "pause-pop");
    void row.offsetWidth;
    row.classList.add(className);
    window.setTimeout(() => row.classList.remove(className), 430);
  }

  function syncUI(animationType) {
    const audio = getAudio();
    const rows = getRows();
    const currentIndex = getIndexFromAudio();
    const isPlaying = audio && !audio.paused;

    activeIndex = currentIndex;
    setMiniPlayer(currentIndex);

    rows.forEach((row, index) => {
      const button = row.querySelector(".play-small");
      const currentAndPlaying = index === currentIndex && isPlaying;

      row.classList.toggle("active", index === currentIndex);
      row.classList.toggle("is-playing", currentAndPlaying);

      if (button) {
        button.textContent = currentAndPlaying ? "❚❚" : "▶";
        button.setAttribute("aria-label", currentAndPlaying ? "Pause track" : "Play track");
      }
    });

    const progress = audio && audio.duration ? audio.currentTime / audio.duration : 0;
    renderWave(currentIndex, progress);

    const time = document.getElementById("time");
    if (time && audio) {
      time.textContent = `${fmt(audio.currentTime)} / ${fmt(audio.duration)}`;
    }

    if (animationType === "play") {
      animateRow(rows[currentIndex], "play-pop");
    }

    if (animationType === "pause") {
      animateRow(rows[currentIndex], "pause-pop");
    }
  }

  async function toggleTrack(index) {
    const audio = getAudio();
    if (!audio) return;

    const track = tracks[index];
    if (!track) return;

    const targetSrc = absoluteUrl(track.file);
    const sameTrack = audio.src === targetSrc;

    activeIndex = index;
    setMiniPlayer(index);
    renderWave(index, 0);

    if (sameTrack && !audio.paused) {
      audio.pause();
      syncUI("pause");
      return;
    }

    if (!sameTrack) {
      audio.pause();
      audio.src = targetSrc;
      audio.load();
    }

    try {
      await audio.play();
      syncUI("play");
    } catch (error) {
      console.warn(error);
      const status = document.getElementById("audio-status");
      if (status) status.textContent = "Audio non partito: premi di nuovo play.";
      syncUI("pause");
    }
  }

  document.addEventListener("click", function (event) {
    if (event.target.closest(".credit-link")) return;

    const playButton = event.target.closest(".play-small");
    const row = event.target.closest(".track");

    if (!playButton && !row) return;

    const rows = getRows();
    const targetRow = row || playButton.closest(".track");
    const index = rows.indexOf(targetRow);

    if (index < 0) return;

    event.preventDefault();
    event.stopPropagation();
    event.stopImmediatePropagation();

    toggleTrack(index);
  }, true);

  document.addEventListener("click", function (event) {
    const mainPlay = event.target.closest("#play, #hero-play");
    if (!mainPlay) return;

    const audio = getAudio();
    if (!audio) return;

    event.preventDefault();
    event.stopPropagation();
    event.stopImmediatePropagation();

    if (!audio.paused) {
      audio.pause();
      syncUI("pause");
    } else {
      toggleTrack(activeIndex);
    }
  }, true);

  const audio = getAudio();

  if (audio) {
    audio.addEventListener("play", () => syncUI("play"));
    audio.addEventListener("pause", () => syncUI("pause"));
    audio.addEventListener("ended", () => syncUI("pause"));
    audio.addEventListener("loadedmetadata", () => syncUI());
    audio.addEventListener("timeupdate", () => syncUI());
  }

  window.addEventListener("DOMContentLoaded", () => {
    setMiniPlayer(0);
    renderWave(0, 0);
    syncUI();
    setTimeout(syncUI, 300);
    setTimeout(syncUI, 1000);
  });

  window.addEventListener("load", () => {
    setMiniPlayer(activeIndex);
    renderWave(activeIndex, 0);
    syncUI();
    setTimeout(syncUI, 300);
    setTimeout(syncUI, 1000);
  });
})();
</script>
