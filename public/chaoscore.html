<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>#chaoscore — Douglas Busta</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#13070a" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #090608;
      --panel: rgba(255,255,255,0.055);
      --panel-2: rgba(255,255,255,0.085);
      --text: #fff;
      --muted: rgba(255,255,255,0.62);
      --soft: rgba(255,255,255,0.12);
      --red: #6f101a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 15%, rgba(120, 0, 20, 0.24), transparent 36%),
        radial-gradient(circle at 90% 75%, rgba(90, 0, 18, 0.18), transparent 38%),
        #080608;
    }

    button, a {
      font: inherit;
    }

    .shell {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 42px 0 128px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(240px, 340px) 1fr;
      gap: 36px;
      align-items: start;
    }

    .cover-wrap {
      width: 100%;
    }

    .cover-credit {
      margin: 10px 0 0;
      color: rgba(255,255,255,0.58);
      font-size: 0.88rem;
      text-align: center;
    }

    .cover {
      width: 100%;
      display: block;
      border-radius: 24px;
      box-shadow: 0 22px 70px rgba(0,0,0,0.42);
      background: rgba(255,255,255,0.05);
    }
    .cover-picker {
      margin-top: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
    }

    .cover-arrow {
      width: 38px;
      height: 38px;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 999px;
      color: rgba(255,255,255,0.72);
      background: rgba(255,255,255,0.035);
      cursor: pointer;
      font-size: 1.7rem;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding-bottom: 3px;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .cover-arrow:hover {
      background: rgba(255,255,255,0.10);
      color: #fff;
      transform: scale(1.04);
    }

    .cover-current {
      display: none;
    }

.install-buttons {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .clean-button {
      border: 1px solid var(--soft);
      border-radius: 14px;
      min-height: 44px;
      padding: 10px 12px;
      color: var(--text);
      background: rgba(16, 14, 16, 0.78);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08);
    }

    .clean-button:hover {
      background: rgba(255,255,255,0.095);
    }


    .quality-downloads {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .quality-button {
      min-height: 42px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.13);
      color: rgba(255,255,255,0.88);
      background: rgba(255,255,255,0.045);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 650;
      text-align: center;
    }

    .quality-button:hover {
      color: #fff;
      background: rgba(255,255,255,0.09);
    }

    .info {
      padding-top: 8px;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
      margin-bottom: 14px;
    }

    .pill {
      border: 1px solid var(--soft);
      border-radius: 999px;
      padding: 9px 13px;
      color: var(--text);
      background: rgba(255,255,255,0.06);
      cursor: pointer;
      text-decoration: none;
      font-size: 0.92rem;
    }

    .pill:hover {
      background: rgba(255,255,255,0.11);
    }

    h1 {
      margin: 0;
      font-size: clamp(2.65rem, 7vw, 5.4rem);
      letter-spacing: -0.08em;
      line-height: 0.86;
    }

    .artist {
      margin: 10px 0 0;
      color: var(--text);
      font-weight: 650;
    }

    .by {
      margin: 4px 0 24px;
      color: var(--muted);
    }

    .tracks {
      display: grid;
      gap: 8px;
      margin-top: 24px;
    }

    .track {
      display: grid;
      grid-template-columns: 36px 42px 1fr auto;
      align-items: center;
      gap: 10px;
      min-height: 58px;
      border: 1px solid rgba(255,255,255,0.075);
      border-radius: 16px;
      padding: 8px 12px;
      background: rgba(255,255,255,0.042);
      cursor: pointer;
    }

    .track:hover,
    .track.active {
      background: rgba(120, 15, 28, 0.23);
      border-color: rgba(255,255,255,0.13);
    }

    .num {
      color: var(--muted);
      text-align: right;
      font-size: 0.9rem;
    }

    .play-small {
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 999px;
      color: var(--text);
      background: rgba(255,255,255,0.08);
      cursor: pointer;
    }

    .track-title {
      font-weight: 760;
      line-height: 1.12;
    }

    .track-sub {
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .credit-link {
      border: 0;
      background: transparent;
      color: rgba(255,255,255,0.55);
      cursor: pointer;
      text-transform: lowercase;
      padding: 8px;
    }

    .credit-link:hover {
      color: white;
    }


    .track.playing {
      animation: trackPulse 420ms ease;
    }

    .track.playing .play-small {
      background: rgba(255,255,255,0.92);
      color: #080608;
      transform: scale(1.04);
    }

    .play-small {
      transition: transform 160ms ease, background 160ms ease, color 160ms ease;
    }

    @keyframes trackPulse {
      0% {
        transform: scale(1);
      }
      45% {
        transform: scale(1.012);
      }
      100% {
        transform: scale(1);
      }
    }


    .track {
      transition: background 180ms ease, border-color 180ms ease, transform 180ms ease;
    }

    .play-small {
      transition: transform 160ms ease, background 160ms ease, color 160ms ease, box-shadow 160ms ease;
    }

    .track.is-playing {
      background: rgba(120, 15, 28, 0.34);
      border-color: rgba(255,255,255,0.22);
    }

    .track.is-playing .play-small {
      background: rgba(255,255,255,0.94);
      color: #080608;
      transform: scale(1.08);
      box-shadow: 0 0 18px rgba(255,255,255,0.14);
    }

    .track.play-pop {
      animation: trackPlayPop 360ms ease;
    }

    .track.pause-pop {
      animation: trackPausePop 280ms ease;
    }

    @keyframes trackPlayPop {
      0% { transform: scale(1); }
      45% { transform: scale(1.014); }
      100% { transform: scale(1); }
    }

    @keyframes trackPausePop {
      0% { transform: scale(1.01); }
      100% { transform: scale(1); }
    }

    .player {
      position: fixed;
      left: 18px;
      right: 18px;
      bottom: 16px;
      z-index: 20;
      display: grid;
      grid-template-columns: minmax(160px, 260px) 1fr auto;
      gap: 18px;
      align-items: center;
      padding: 12px 16px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      background: rgba(12, 10, 12, 0.86);
      backdrop-filter: blur(20px);
      box-shadow: 0 16px 50px rgba(0,0,0,0.46);
    }

    .now {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .now img {
      width: 46px;
      height: 46px;
      border-radius: 10px;
      object-fit: cover;
    }

    .now-title {
      font-weight: 760;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .now-sub {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .wave {
      display: flex;
      align-items: center;
      gap: 4px;
      min-height: 42px;
      padding: 0 4px;
      cursor: pointer;
    }

    .bar {
      flex: 1;
      min-width: 4px;
      height: calc(8px + var(--h) * 34px);
      border-radius: 999px;
      background: rgba(255,255,255,0.15);
    }

    .bar.on {
      background: rgba(255,255,255,0.58);
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .round {
      width: 42px;
      height: 42px;
      border: 0;
      border-radius: 999px;
      background: white;
      color: black;
      font-weight: 900;
      cursor: pointer;
    }

    .round.secondary {
      width: 34px;
      height: 34px;
      background: rgba(255,255,255,0.08);
      color: white;
    }

    .time {
      color: var(--muted);
      font-size: 0.82rem;
      min-width: 82px;
      text-align: right;
    }


    .credits-roll {
      text-align: center;
      display: grid;
      gap: 2rem;
      padding: 4px 0 2px;
    }

    .credits-block {
      display: grid;
      gap: 1rem;
    }

    .credits-role {
      color: rgba(255,255,255,0.48);
      font-size: 0.76rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .credits-name {
      color: rgba(255,255,255,0.88);
      font-size: 0.98rem;
      line-height: 1.35;
      font-weight: 560;
    }

    .credits-name a {
      color: rgba(255,255,255,0.88);
      text-decoration: none;
      border-bottom: 1px solid rgba(255,255,255,0.26);
    }

    .credits-name a:hover {
      color: #fff;
      border-bottom-color: rgba(255,255,255,0.72);
    }


    .credits-block.credits-tight {
      gap: 0.45rem;
    }
dialog {
      width: min(520px, calc(100% - 32px));
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 22px;
      color: white;
      background: rgba(22, 20, 23, 0.96);
      box-shadow: 0 28px 90px rgba(0,0,0,0.55);
      padding: 0;
    }

    dialog::backdrop {
      background: rgba(0,0,0,0.62);
      backdrop-filter: blur(8px);
    }

    .modal-inner {
      padding: 22px;
    }

    .modal-inner h2 {
      margin: 0 0 12px;
      font-size: 1.25rem;
    }

    .modal-inner p {
      white-space: pre-line;
      color: rgba(255,255,255,0.78);
      line-height: 1.55;
      margin: 0 0 18px;
    }

    .modal-inner button {
      width: 100%;
    }

    @media (max-width: 820px) {
      .shell {
        padding-top: 22px;
      }

      .hero {
        grid-template-columns: 1fr;
        gap: 22px;
      }

      .top-actions {
        justify-content: flex-start;
      }

  
    .track.playing {
      animation: trackPulse 420ms ease;
    }

    .track.playing .play-small {
      background: rgba(255,255,255,0.92);
      color: #080608;
      transform: scale(1.04);
    }

    .play-small {
      transition: transform 160ms ease, background 160ms ease, color 160ms ease;
    }

    @keyframes trackPulse {
      0% {
        transform: scale(1);
      }
      45% {
        transform: scale(1.012);
      }
      100% {
        transform: scale(1);
      }
    }


    .track {
      transition: background 180ms ease, border-color 180ms ease, transform 180ms ease;
    }

    .play-small {
      transition: transform 160ms ease, background 160ms ease, color 160ms ease, box-shadow 160ms ease;
    }

    .track.is-playing {
      background: rgba(120, 15, 28, 0.34);
      border-color: rgba(255,255,255,0.22);
    }

    .track.is-playing .play-small {
      background: rgba(255,255,255,0.94);
      color: #080608;
      transform: scale(1.08);
      box-shadow: 0 0 18px rgba(255,255,255,0.14);
    }

    .track.play-pop {
      animation: trackPlayPop 360ms ease;
    }

    .track.pause-pop {
      animation: trackPausePop 280ms ease;
    }

    @keyframes trackPlayPop {
      0% { transform: scale(1); }
      45% { transform: scale(1.014); }
      100% { transform: scale(1); }
    }

    @keyframes trackPausePop {
      0% { transform: scale(1.01); }
      100% { transform: scale(1); }
    }

    .player {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .controls {
        justify-content: center;
      }

      .track {
        grid-template-columns: 28px 38px 1fr;
      }

      .credit-link {
        grid-column: 3;
        justify-self: start;
        padding-left: 0;
      }
    }
  
    /* FORCE FINAL CREDITS SPACING */
    .credits-block:has(a[href*="39redboy"]),
    .credits-block:has(a[href*="ohmygador"]),
    .credits-block:has(a[href*="dd_deffy"]),
    .credits-block:has(a[href*="vitali.mp4"]) {
      gap: 0.32rem !important;
    }

    .credits-block:has(a[href*="39redboy"]) .credits-tag,
    .credits-block:has(a[href*="ohmygador"]) .credits-tag,
    .credits-block:has(a[href*="dd_deffy"]) .credits-tag {
      margin-top: -0.45rem !important;
      padding-top: 0 !important;
      line-height: 1.05 !important;
    }

    .credits-block:has(a[href*="39redboy"]) .credits-inline-tag,
    .credits-block:has(a[href*="ohmygador"]) .credits-inline-tag,
    .credits-block:has(a[href*="dd_deffy"]) .credits-inline-tag {
      display: block !important;
      margin-top: 0.18rem !important;
      line-height: 1.05 !important;
    }

    .credits-block:has(a[href*="vitali.mp4"]) .credits-name {
      margin-top: -0.25rem !important;
    }

  
    /* REAL CIRCLE CLOSE BUTTON */
    dialog {
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.26) transparent;
      transition: opacity 160ms ease, transform 160ms ease;
    }

    dialog.modal-closing {
      opacity: 0;
      transform: translateY(8px) scale(0.985);
    }

    dialog::-webkit-scrollbar {
      width: 10px;
    }

    dialog::-webkit-scrollbar-track {
      background: transparent;
      border-radius: 999px;
      margin: 18px 0;
    }

    dialog::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.24);
      border-radius: 999px;
      border: 3px solid transparent;
      background-clip: content-box;
    }

    dialog::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.38);
      border: 3px solid transparent;
      background-clip: content-box;
    }

    .modal-inner {
      position: relative;
    }

    #modal-close-circle {
      position: sticky;
      top: 10px;
      z-index: 9999;

      width: 26px;
      height: 26px;
      min-width: 26px;
      min-height: 26px;
      max-width: 26px;
      max-height: 26px;

      margin: -6px 0 -20px auto;

      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.09);

      display: flex;
      align-items: center;
      justify-content: center;

      cursor: pointer;
      user-select: none;

      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.12),
        0 8px 18px rgba(0,0,0,0.24);

      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);

      transition:
        transform 140ms ease,
        background 140ms ease,
        border-color 140ms ease,
        opacity 140ms ease;
    }

    #modal-close-circle:hover {
      background: rgba(255,255,255,0.16);
      border-color: rgba(255,255,255,0.34);
      transform: scale(1.08);
    }

    #modal-close-circle:active {
      transform: scale(0.92);
      opacity: 0.82;
    }

    .modal-close-line {
      position: absolute;
      width: 12px;
      height: 1.6px;
      border-radius: 999px;
      background: rgba(255,255,255,0.9);
      pointer-events: none;
    }

    .modal-close-line.line-a {
      transform: rotate(45deg);
    }

    .modal-close-line.line-b {
      transform: rotate(-45deg);
    }

  
    /* FORCE CLOSE CIRCLE CLICK */
    #modal-close-circle {
      pointer-events: auto !important;
    }

    #modal-close-circle * {
      pointer-events: none !important;
    }

  
    .chaoscore-back-to-files {
      position: fixed;
      top: 18px;
      left: 18px;
      z-index: 9999;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(231,224,210,0.24);
      border-radius: 999px;
      background: rgba(10,8,7,0.78);
      color: rgba(231,224,210,0.9);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding: 10px 12px;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.68rem;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      box-shadow: 0 18px 50px rgba(0,0,0,0.34);
    }

    .chaoscore-back-to-files:hover {
      color: #fff;
      border-color: rgba(231,224,210,0.45);
      background: rgba(30,18,15,0.9);
    }
  
    /* COVER ARROW REPAIR */
    .cover-arrow-repaired {
      border: 0 !important;
      outline: 0 !important;
      box-shadow: none !important;
      background: transparent !important;
      padding: 3px 10px !important;
      min-width: auto !important;
      width: auto !important;
      height: auto !important;
      color: rgba(231,224,210,0.92) !important;
      font-size: 1rem !important;
      line-height: 1 !important;
      letter-spacing: 0 !important;
      text-transform: none !important;
      border-radius: 0 !important;
      cursor: pointer !important;
    }

    .cover-arrow-repaired:hover {
      color: #fff !important;
      background: transparent !important;
      border: 0 !important;
      box-shadow: none !important;
    }
    /* END COVER ARROW REPAIR */

  
    /* chaos-sheet-size-polish */

    html. .player. {
      max-width: 560px !important;
    }

    html. .player. {
      grid-template-columns: minmax(0, 1fr) auto !important;
    }

    html. .player. .now-title {
      font-size: 0.72rem !important;
      line-height: 1.05 !important;
    }

    html. .player. .now-meta,
    html. .player. .credits,
    html. .player. .track-meta {
      display: none !important;
    }

    html. .player. .now-title {
      font-size: 0.86rem !important;
      line-height: 1.08 !important;
    }

    html. .player. .wave {
      height: 52px !important;
      max-height: 52px !important;
      min-height: 52px !important;
      overflow: hidden !important;
    }

    html. .player. .wave span,
    html. .player. .wave div {
      max-height: 44px !important;
    }

    html. .player .controls .round,
    html. .player .round {
      width: 32px !important;
      height: 32px !important;
      min-width: 32px !important;
      min-height: 32px !important;
      font-size: 0.82rem !important;
    }

    html. .player #play {
      width: 38px !important;
      height: 38px !important;
      min-width: 38px !important;
      min-height: 38px !important;
      font-size: 0.86rem !important;
    }

    html. .player. .time {
      font-size: 0.62rem !important;
      text-align: center !important;
      opacity: 0.72 !important;
      margin-top: -3px !important;
    }

    html. .player. .chaos-player-volume {
      margin-top: -2px !important;
      font-size: 0.54rem !important;
    }

    html. .player. .chaos-player-volume input {
      width: min(230px, 56vw) !important;
    }

    html. .chaos-player-handle {
      width: 38px !important;
      height: 4px !important;
      margin-bottom: 1px !important;
      opacity: 0.72 !important;
    }

    @media (max-width: 620px) {
      html. .player. {
        width: calc(100% - 12px) !important;
        max-width: none !important;
      }

      html. .player. {
        height: 74px !important;
      }

      html. .player. {
        height: min(278px, calc(100dvh - 20px)) !important;
      }

      html. .player. .wave {
        height: 48px !important;
        max-height: 48px !important;
        min-height: 48px !important;
      }
    }

  

    /* chaos-drag-polish */
    html. .player. {
      touch-action: none !important;
      user-select: none !important;
      -webkit-user-select: none !important;
      overscroll-behavior: contain !important;
    }

    html. .chaos-player-handle {
      touch-action: none !important;
      cursor: grab !important;
    }

    html. .player.chaos-player-dragging {
      transition: transform 80ms linear, height 180ms ease !important;
    }

    html. .player.chaos-player-dragging-up {
      transform: translateX(-50%) translateY(-8px) !important;
    }

    html. .player.chaos-player-dragging-down {
      transform: translateX(-50%) translateY(8px) !important;
    }

    html. .player button,
    html. .player input,
    html. .player a {
      touch-action: manipulation !important;
    }

    @media (max-width: 620px) {
      html. .chaos-player-handle {
        width: 52px !important;
        height: 6px !important;
        margin-top: 2px !important;
        margin-bottom: 4px !important;
      }

      html. .player. {
        bottom: max(10px, env(safe-area-inset-bottom)) !important;
      }
    }

  

    /* chaos-files-topbar-visibility-fix */

  async function toggleTrack(index) {
    const audio = getAudio();
    if (!audio) return;

    const track = tracks[index];
    if (!track) return;

    const targetSrc = absoluteUrl(track.file);
    const sameTrack = audio.src === targetSrc;

    activeIndex = index;
    setMiniPlayer(index);
    renderWave(index, 0);

    if (sameTrack && !audio.paused) {
      audio.pause();
      syncUI("pause");
      return;
    }

    if (!sameTrack) {
      audio.pause();
      audio.src = targetSrc;
      audio.load();
    }

    try {
      await audio.play();
      syncUI("play");
    } catch (error) {
      console.warn(error);
      const status = document.getElementById("audio-status");
      if (status) status.textContent = "Audio non partito: premi di nuovo play.";
      syncUI("pause");
    }
  }

  document.addEventListener("click", function (event) {
    if (event.target.closest(".credit-link")) return;

    const playButton = event.target.closest(".play-small");
    const row = event.target.closest(".track");

    if (!playButton && !row) return;

    const rows = getRows();
    const targetRow = row || playButton.closest(".track");
    const index = rows.indexOf(targetRow);

    if (index < 0) return;

    event.preventDefault();
    event.stopPropagation();
    event.stopImmediatePropagation();

    toggleTrack(index);
  }, true);

  document.addEventListener("click", function (event) {
    const mainPlay = event.target.closest("#play, #hero-play");
    if (!mainPlay) return;

    const audio = getAudio();
    if (!audio) return;

    event.preventDefault();
    event.stopPropagation();
    event.stopImmediatePropagation();

    if (!audio.paused) {
      audio.pause();
      syncUI("pause");
    } else {
      toggleTrack(activeIndex);
    }
  }, true);

  const audio = getAudio();

  if (audio) {
    audio.addEventListener("play", () => syncUI("play"));
    audio.addEventListener("pause", () => syncUI("pause"));
    audio.addEventListener("ended", () => syncUI("pause"));
    audio.addEventListener("loadedmetadata", () => syncUI());
    audio.addEventListener("timeupdate", () => syncUI());
  }

  window.addEventListener("DOMContentLoaded", () => {
    setMiniPlayer(0);
    renderWave(0, 0);
    syncUI();
    setTimeout(syncUI, 300);
    setTimeout(syncUI, 1000);
  });

  window.addEventListener("load", () => {
    setMiniPlayer(activeIndex);
    renderWave(activeIndex, 0);
    syncUI();
    setTimeout(syncUI, 300);
    setTimeout(syncUI, 1000);
  });
})();
</script>
