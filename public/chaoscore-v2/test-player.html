<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>#chaoscore player v2 test</title>

  <link rel="stylesheet" href="/chaoscore-v2/chaoscore-player-v2.css">

  <style>
    :root {
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 0%, rgba(82, 12, 20, 0.28), transparent 42%),
        #050505;
      color: rgba(231,224,210,0.96);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(980px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 32px 0 160px;
      display: grid;
      gap: 20px;
    }

    .hero {
      display: grid;
      gap: 10px;
      padding: 24px;
      border: 1px solid rgba(231,224,210,0.12);
      border-radius: 28px;
      background: rgba(255,255,255,0.035);
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2rem, 8vw, 5rem);
      letter-spacing: -0.08em;
      line-height: 0.9;
    }

    .hero p {
      margin: 0;
      color: rgba(231,224,210,0.58);
    }

    .tracklist {
      display: grid;
      gap: 8px;
    }

    .track {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border: 1px solid rgba(231,224,210,0.10);
      border-radius: 18px;
      background: rgba(255,255,255,0.028);
      color: inherit;
      font: inherit;
      text-align: left;
      cursor: pointer;
    }

    .track:hover {
      background: rgba(255,255,255,0.055);
    }

    .track-number {
      color: rgba(231,224,210,0.42);
      font-variant-numeric: tabular-nums;
    }

    .track-title {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .track-artist {
      color: rgba(231,224,210,0.42);
      font-size: 0.75rem;
    }
  </style>
</head>

<body>
  <main>
    <section class="hero">
      <h1>#chaoscore</h1>
      <p>Player v2 test — pagina isolata, non collegata alla pagina live.</p>
    </section>

    <section class="tracklist" id="chaoscore-v2-test-tracks"></section>
  </main>

  <script src="/chaoscore-v2/chaoscore-tracks.js"></script>
  <script src="/chaoscore-v2/chaoscore-player-v2.js"></script>

  <script>
    const list = document.getElementById("chaoscore-v2-test-tracks");

    window.CHAOSCORE_TRACKS.forEach((track, index) => {
      const button = document.createElement("button");
      button.className = "track";
      button.type = "button";

      button.innerHTML = `
        <span class="track-number">${track.number}</span>
        <span>
          <span class="track-title">${track.title}</span><br>
          <span class="track-artist">${Array.isArray(track.artists) ? track.artists.join(", ") : track.artist}</span>
        </span>
        <span>PLAY</span>
      `;

      button.addEventListener("click", () => {
        window.ChaoscorePlayerV2.loadTrack(index, true);
      });

      list.appendChild(button);
    });

    window.ChaoscorePlayerV2Boot();
  </script>
</body>
</html>
