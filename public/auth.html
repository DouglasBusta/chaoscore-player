<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Busta Files Account</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 22px;
      background:
        radial-gradient(circle at 20% 0%, rgba(139,23,23,0.34), transparent 35%),
        radial-gradient(circle at 80% 20%, rgba(231,224,210,0.08), transparent 28%),
        linear-gradient(180deg, #0c0908 0%, #030303 72%);
      color: #e7e0d2;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    .card {
      width: min(560px, 100%);
      border: 1px solid rgba(231,224,210,0.2);
      border-radius: 28px;
      padding: clamp(24px, 6vw, 42px);
      background:
        linear-gradient(135deg, rgba(231,224,210,0.08), rgba(231,224,210,0.025)),
        rgba(0,0,0,0.34);
      box-shadow: 0 32px 110px rgba(0,0,0,0.48);
    }

    .kicker {
      color: rgba(231,224,210,0.56);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.72rem;
      margin-bottom: 14px;
    }

    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(3rem, 11vw, 6rem);
      line-height: 0.86;
      letter-spacing: -0.08em;
      margin: 0 0 18px;
      text-transform: uppercase;
    }

    p {
      color: rgba(231,224,210,0.72);
      line-height: 1.65;
      margin: 0 0 18px;
    }

    .mode-switch {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 18px 0;
    }

    .mode-switch a {
      border: 1px solid rgba(231,224,210,0.18);
      border-radius: 999px;
      color: rgba(231,224,210,0.68);
      background: rgba(255,255,255,0.035);
      text-align: center;
      text-decoration: none;
      padding: 10px 12px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.68rem;
    }

    .mode-switch a.active {
      color: #fff;
      border-color: rgba(139,23,23,0.72);
      background: rgba(139,23,23,0.34);
    }

    form {
      display: grid;
      gap: 11px;
      margin-top: 18px;
    }

    label {
      color: rgba(231,224,210,0.56);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 0.68rem;
      margin-top: 6px;
    }

    input {
      width: 100%;
      border: 1px solid rgba(231,224,210,0.24);
      border-radius: 16px;
      background: rgba(0,0,0,0.24);
      color: #e7e0d2;
      padding: 14px;
      font: inherit;
      font-size: 16px;
      line-height: 1.2;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }

    input:focus {
      border-color: rgba(231,224,210,0.46);
      background: rgba(0,0,0,0.32);
    }

    button, a.button {
      width: 100%;
      border: 1px solid rgba(231,224,210,0.24);
      border-radius: 999px;
      background: rgba(231,224,210,0.08);
      color: #e7e0d2;
      padding: 13px 15px;
      font: inherit;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.72rem;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      margin-top: 10px;
    }

    button.primary {
      border-color: rgba(139,23,23,0.72);
      background: rgba(139,23,23,0.42);
    }

    .forgot {
      background: transparent;
      color: rgba(231,224,210,0.62);
    }

    .message {
      min-height: 24px;
      margin-top: 16px;
      color: rgba(231,224,210,0.78);
      line-height: 1.55;
      font-size: 0.82rem;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .debug {
      margin-top: 12px;
      color: rgba(255,180,180,0.72);
      font-size: 0.68rem;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <main class="card">
    <div class="kicker">Busta Files Access Terminal</div>
    <h1 id="title">Sign Up</h1>
    <p id="copy">Create your private Busta Files account.</p>

    <div class="mode-switch">
      <a id="signup-tab" href="/auth?mode=signup">Sign Up</a>
      <a id="login-tab" href="/auth?mode=login">Log In</a>
    </div>

    <form id="auth-form" novalidate>
      <label for="email">Email address</label>
      <input id="email" type="email" autocomplete="email" required>

      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="new-password" required>

      <div id="confirm-wrap">
        <label for="confirm">Confirm password</label>
        <input id="confirm" type="password" autocomplete="new-password">
      </div>

      <button id="main-action" class="primary" type="submit">Create Account</button>
      <button id="forgot" class="forgot hidden" type="button">Forgot Password?</button>
      <a class="button" href="/">Back to Busta Files</a>
    </form>

    <div id="message" class="message"></div>
    <div id="debug" class="debug hidden"></div>
  </main>

  <script>
    const SUPABASE_URL = "https://giixvsfwsguudrvvbmkj.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Ae2dmdo-KYyNxcVntZg_2Q_xkWq5Bzm";

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    const params = new URLSearchParams(window.location.search);
    let mode = params.get("mode") === "login" ? "login" : "signup";

    const title = document.getElementById("title");
    const copy = document.getElementById("copy");
    const signupTab = document.getElementById("signup-tab");
    const loginTab = document.getElementById("login-tab");
    const form = document.getElementById("auth-form");
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const confirm = document.getElementById("confirm");
    const confirmWrap = document.getElementById("confirm-wrap");
    const mainAction = document.getElementById("main-action");
    const forgot = document.getElementById("forgot");
    const message = document.getElementById("message");
    const debug = document.getElementById("debug");

    function setMessage(text) {
      message.textContent = text || "";
    }

    function setDebug(value) {
      if (!value) {
        debug.textContent = "";
        debug.classList.add("hidden");
        return;
      }

      debug.textContent = value;
      debug.classList.remove("hidden");
    }

    function renderMode() {
      const isSignup = mode === "signup";

      title.textContent = isSignup ? "Sign Up" : "Log In";
      copy.textContent = isSignup
        ? "Create your private Busta Files account."
        : "Enter your private Busta Files account.";

      signupTab.classList.toggle("active", isSignup);
      loginTab.classList.toggle("active", !isSignup);

      confirmWrap.classList.toggle("hidden", !isSignup);
      confirm.required = isSignup;

      mainAction.textContent = isSignup ? "Create Account" : "Log In";
      forgot.classList.toggle("hidden", isSignup);

      password.autocomplete = isSignup ? "new-password" : "current-password";
    }

    function checkEmailTypo(value) {
      const v = (value || "").trim().toLowerCase();

      if (!v.includes("@") || !v.includes(".")) {
        return "Enter a valid email address.";
      }

      if (
        v.endsWith("@gmail.cc") ||
        v.endsWith("@gmai.com") ||
        v.endsWith("@gmial.com") ||
        v.endsWith("@gmail.con")
      ) {
        return "This email looks wrong. Did you mean @gmail.com?";
      }

      return "";
    }

    function readableError(error) {
      if (!error) return "Unknown error.";
      if (typeof error === "string") return error;
      if (error.message) return error.message;
      if (error.error_description) return error.error_description;
      if (error.error) return error.error;

      try {
        const json = JSON.stringify(error);
        if (json && json !== "{}") return json;
      } catch (_) {}

      return "Unknown auth error. See debug below.";
    }

    async function rawAuthDebug(endpoint, payload) {
      try {
        const response = await fetch(SUPABASE_URL + endpoint, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + SUPABASE_KEY
          },
          body: JSON.stringify(payload)
        });

        const text = await response.text();
        return "HTTP " + response.status + "\\n" + text;
      } catch (err) {
        return "Network/debug error: " + (err.message || String(err));
      }
    }

    async function handleSubmit(event) {
      event.preventDefault();
      setMessage("");
      setDebug("");

      const userEmail = email.value.trim().toLowerCase();
      const userPassword = password.value;
      const confirmPassword = confirm.value;

      const emailWarning = checkEmailTypo(userEmail);
      if (emailWarning) {
        setMessage(emailWarning);
        return;
      }

      if (userPassword.length < 8) {
        setMessage("Password must be at least 8 characters.");
        return;
      }

      if (mode === "signup" && userPassword !== confirmPassword) {
        setMessage("Passwords do not match.");
        return;
      }

      mainAction.disabled = true;
      mainAction.textContent = mode === "signup" ? "Creating..." : "Logging in...";

      try {
        let result;

        if (mode === "signup") {
          result = await client.auth.signUp({
            email: userEmail,
            password: userPassword,
            options: {
              emailRedirectTo: "https://lookapp.org/account"
            }
          });
        } else {
          result = await client.auth.signInWithPassword({
            email: userEmail,
            password: userPassword
          });
        }

        if (result.error) {
          const msg = readableError(result.error);
          setMessage((mode === "signup" ? "Sign up failed: " : "Login failed: ") + msg);

          const endpoint = mode === "signup"
            ? "/auth/v1/signup"
            : "/auth/v1/token?grant_type=password";

          const debugText = await rawAuthDebug(endpoint, {
            email: userEmail,
            password: userPassword
          });

          setDebug(debugText);
          return;
        }

        const sessionResult = await client.auth.getSession();
        const session = sessionResult.data?.session || result.data?.session || null;

        if (!session?.user) {
          setMessage("Account created. Now switch to Log In with the same email and password.");
          mode = "login";
          history.replaceState(null, "", "/auth?mode=login");
          renderMode();
          return;
        }

        setMessage(mode === "signup" ? "Account created. Opening your account..." : "Access granted. Opening your account...");

        setTimeout(() => {
          window.location.href = "/account.html";
        }, 700);
      } catch (err) {
        setMessage("Unexpected error: " + readableError(err));
        setDebug(String(err?.stack || err?.message || err));
      } finally {
        mainAction.disabled = false;
        renderMode();
      }
    }

    async function resetPassword() {
      setMessage("");
      setDebug("");

      const userEmail = email.value.trim().toLowerCase();
      const emailWarning = checkEmailTypo(userEmail);

      if (emailWarning) {
        setMessage(emailWarning);
        return;
      }

      setMessage("Sending password reset email...");

      const result = await client.auth.resetPasswordForEmail(userEmail, {
        redirectTo: "https://lookapp.org/account"
      });

      if (result.error) {
        setMessage("Reset failed: " + readableError(result.error));
        return;
      }

      setMessage("Password reset email sent. Check your inbox.");
    }

    signupTab.addEventListener("click", (event) => {
      event.preventDefault();
      mode = "signup";
      history.replaceState(null, "", "/auth?mode=signup");
      setMessage("");
      setDebug("");
      renderMode();
    });

    loginTab.addEventListener("click", (event) => {
      event.preventDefault();
      mode = "login";
      history.replaceState(null, "", "/auth?mode=login");
      setMessage("");
      setDebug("");
      renderMode();
    });

    form.addEventListener("submit", handleSubmit);
    forgot.addEventListener("click", resetPassword);

    renderMode();
  </script>
</body>
</html>
