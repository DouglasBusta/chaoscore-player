<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pagamento riuscito — LOOK APP SHOP</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #050505;
      color: #f2eadf;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(560px, calc(100vw - 32px));
      border: 1px solid rgba(242,234,223,.18);
      border-radius: 28px;
      padding: 28px;
      background: rgba(255,255,255,.04);
      box-shadow: 0 24px 80px rgba(0,0,0,.45);
    }
    h1 { margin: 0 0 12px; font-size: 34px; }
    p { line-height: 1.5; color: rgba(242,234,223,.78); }
    a {
      display: inline-block;
      margin-top: 16px;
      color: #050505;
      background: #5bffbd;
      padding: 12px 16px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 800;
    }
  </style>
  <link rel="stylesheet" href="/look-auth-gate.css?v=1">
</head>
<body>
  <main>
    <h1>Pagamento riuscito.</h1>
    <p>Ordine confermato da LOOK APP SHOP. Il pagamento è stato ricevuto correttamente.</p>
    <p>LOOK APP SHOP ha ricevuto i dettagli dell’ordine. Le email automatiche di conferma sono state inviate dal sistema.</p>
    <a href="/shop/">Torna allo shop</a>
  </main>
  <script src="/look-auth-gate.js?v=1"></script>
</body>
</html>
