<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>User Submissions — Busta Files</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 20% 0%, rgba(139,23,23,0.28), transparent 34%),
        radial-gradient(circle at 82% 12%, rgba(231,224,210,0.08), transparent 28%),
        linear-gradient(180deg, #0c0908 0%, #030303 72%);
      color: #e7e0d2;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    main {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 48px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .topbar a {
      color: rgba(231,224,210,0.72);
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.68rem;
      border: 1px solid rgba(231,224,210,0.18);
      border-radius: 999px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.035);
    }

    .kicker {
      color: rgba(216,247,207,0.78);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 0.72rem;
      margin-bottom: 12px;
    }

    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(3.5rem, 12vw, 8rem);
      line-height: 0.82;
      letter-spacing: -0.09em;
      text-transform: uppercase;
      margin: 0 0 18px;
    }

    .intro {
      max-width: 660px;
      color: rgba(231,224,210,0.64);
      line-height: 1.65;
      margin-bottom: 28px;
      font-size: 0.88rem;
    }

    .search-wrap {
      border: 1px solid rgba(231,224,210,0.14);
      border-radius: 18px;
      padding: 12px;
      background: rgba(0,0,0,0.2);
      margin: 0 0 18px;
    }

    .search-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: rgba(231,224,210,0.58);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.62rem;
      margin-bottom: 8px;
    }

    #submission-search {
      width: 100%;
      border: 1px solid rgba(231,224,210,0.18);
      border-radius: 14px;
      background: rgba(255,255,255,0.045);
      color: #e7e0d2;
      padding: 13px 14px;
      font: inherit;
      outline: none;
    }

    #submission-search:focus {
      border-color: rgba(231,224,210,0.38);
      background: rgba(255,255,255,0.065);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .file-card {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(231,224,210,0.16);
      border-radius: 12px;
      background: rgba(255,255,255,0.025);
      color: #e7e0d2;
      text-decoration: none;
      display: grid;
      grid-template-rows: 1fr auto;
      min-height: 360px;
    }

    .file-card:hover {
      border-color: rgba(231,224,210,0.38);
      color: #fff;
    }

    .file-preview {
      width: 100%;
      height: 100%;
      min-height: 250px;
      object-fit: cover;
      display: block;
      filter: contrast(1.02) saturate(0.95);
    }

    .file-info {
      display: grid;
      gap: 7px;
      padding: 9px 10px 10px;
      background: rgba(0,0,0,0.52);
      border-top: 1px solid rgba(231,224,210,0.08);
    }

    .badge {
      width: fit-content;
      border: 1px solid rgba(231,224,210,0.16);
      border-radius: 999px;
      padding: 3px 6px;
      color: rgba(231,224,210,0.68);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.5rem;
      line-height: 1;
      background: rgba(255,255,255,0.035);
    }

    .file-title {
      color: rgba(231,224,210,0.92);
      font-size: 0.68rem;
      line-height: 1.22;
      word-break: break-word;
    }

    .submitted {
      color: rgba(231,224,210,0.52);
      font-size: 0.58rem;
      line-height: 1.3;
    }

    .actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 2px;
    }

    .actions button {
      appearance: none;
      -webkit-appearance: none;
      border: 1px solid rgba(231,224,210,0.16);
      border-radius: 999px;
      background: rgba(255,255,255,0.035);
      color: rgba(231,224,210,0.72);
      font: inherit;
      font-size: 0.52rem;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 5px 7px;
      cursor: pointer;
      min-height: 21px;
    }

    .actions button:hover {
      color: #fff;
      border-color: rgba(231,224,210,0.34);
    }

    .actions button.is-saved {
      color: rgba(216,247,207,0.92);
      border-color: rgba(216,247,207,0.32);
    }

    .empty {
      border: 1px dashed rgba(231,224,210,0.14);
      border-radius: 16px;
      padding: 18px;
      color: rgba(231,224,210,0.58);
      line-height: 1.5;
    }

    @media (max-width: 850px) {
      .grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 560px) {
      .grid { grid-template-columns: 1fr; }
      .file-card { min-height: 320px; }
    }
  </style>
</head>
<body>
  <main>
    <div class="topbar">
      <a href="/">← Back to Busta Files</a>
      <a href="/account">My Account</a>
    </div>

    <div class="kicker">Other Busta Files / Subfolder</div>
    <h1>User<br>Submissions</h1>
    <div class="intro">
      Approved files submitted by Busta Files users. Each file has its own shareable link and can be saved to your account.
    </div>

    <div class="search-wrap">
      <div class="search-head">
        <span>Search User Submissions</span>
        <span id="search-count">0 results</span>
      </div>
      <input id="submission-search" type="search" placeholder="Search by title, filename, username..." autocomplete="off">
    </div>

    <section id="grid" class="grid">
      <div class="empty">Loading user submissions...</div>
    </section>
  </main>

  <script>
    const SUPABASE_URL = "https://giixvsfwsguudrvvbmkj.supabase.co";
    const SUPABASE_KEY = "sb_publishable_Ae2dmdo-KYyNxcVntZg_2Q_xkWq5Bzm";

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    const grid = document.getElementById("grid");

    function fileId(item) {
      return "user-submission:" + item.file_url;
    }

    function perFileLink(item) {
      return window.location.origin + "/user-submissions?file=" + encodeURIComponent(item.id || item.file_name || item.file_url);
    }

    async function getSavedIds() {
      const sessionResult = await client.auth.getSession();
      const session = sessionResult.data?.session || null;

      if (!session?.user) return new Set();

      const result = await client.rpc("get_my_saved_files");

      if (result.error || !Array.isArray(result.data)) return new Set();

      return new Set(result.data.map(row => row.file_id || row.file_key || row.id).filter(Boolean));
    }

    async function save(item, button) {
      const sessionResult = await client.auth.getSession();
      const session = sessionResult.data?.session || null;

      if (!session?.user) {
        window.location.href = "/auth?mode=login";
        return;
      }

      button.disabled = true;
      button.textContent = "...";

      const result = await client.rpc("save_busta_file", {
        p_file_id: fileId(item),
        p_file_title: item.title || item.file_name || "User Submission",
        p_file_type: "User Submission",
        p_file_url: item.file_url,
        p_file_meta: perFileLink(item)
      });

      button.disabled = false;

      if (result.error) {
        button.textContent = "Save";
        alert("Save failed: " + result.error.message);
        return;
      }

      button.dataset.saved = "1";
      button.textContent = "✓";
      button.classList.add("is-saved");
    }

    async function unsave(item, button) {
      const sessionResult = await client.auth.getSession();
      const session = sessionResult.data?.session || null;

      if (!session?.user) {
        window.location.href = "/auth?mode=login";
        return;
      }

      button.disabled = true;
      button.textContent = "...";

      const result = await client.rpc("unsave_busta_file", {
        p_file_id: fileId(item)
      });

      button.disabled = false;

      if (result.error) {
        button.textContent = "✓";
        alert("Remove failed: " + result.error.message);
        return;
      }

      button.dataset.saved = "0";
      button.textContent = "Save";
      button.classList.remove("is-saved");
    }

    async function share(item, button) {
      const link = perFileLink(item);

      try {
        await navigator.clipboard.writeText(link);
        button.textContent = "Copied";
        setTimeout(() => button.textContent = "Share", 900);
      } catch (_) {
        alert("Copy this link manually: " + link);
      }
    }

    function card(item, savedIds) {
      const isSaved = savedIds.has(fileId(item));

      const a = document.createElement("a");
      a.className = "file-card";
      a.href = item.file_url;
      a.target = "_blank";
      a.rel = "noopener noreferrer";
      a.dataset.fileId = item.id || item.file_name || "";

      const isImage = (item.file_type || "").startsWith("image/") || /\.(png|jpe?g|webp|gif)$/i.test(item.file_url || "");

      a.innerHTML = `
        ${isImage ? `<img class="file-preview" src="${item.file_url}" alt="">` : `<div class="file-preview empty">File</div>`}
        <div class="file-info">
          <div class="badge">Reviewed</div>
          <div class="file-title">${item.title || item.file_name || "User Submission"}</div>
          <div class="submitted">Submitted by @${item.submitted_by_username || "unknown"}</div>
          <div class="actions">
            <button class="save-button ${isSaved ? "is-saved" : ""}" type="button" data-saved="${isSaved ? "1" : "0"}">${isSaved ? "✓" : "Save"}</button>
            <button class="share-button" type="button">Share</button>
          </div>
        </div>
      `;

      const saveButton = a.querySelector(".save-button");
      const shareButton = a.querySelector(".share-button");

      saveButton.addEventListener("click", async (event) => {
        event.preventDefault();
        event.stopPropagation();

        if (saveButton.dataset.saved === "1") {
          await unsave(item, saveButton);
        } else {
          await save(item, saveButton);
        }
      });

      shareButton.addEventListener("click", async (event) => {
        event.preventDefault();
        event.stopPropagation();
        await share(item, shareButton);
      });

      return a;
    }

    let allFiles = [];
    let currentSavedIds = new Set();

    function searchableText(item) {
      return [
        item.title,
        item.file_name,
        item.description,
        item.submitted_by_username,
        item.folder
      ].filter(Boolean).join(" ").toLowerCase();
    }

    function renderFiles() {
      const input = document.getElementById("submission-search");
      const count = document.getElementById("search-count");
      const query = (input?.value || "").trim().toLowerCase();

      const filtered = query
        ? allFiles.filter(item => searchableText(item).includes(query))
        : allFiles;

      if (count) count.textContent = filtered.length + " result" + (filtered.length === 1 ? "" : "s");

      grid.innerHTML = "";

      if (!filtered.length) {
        grid.innerHTML = `<div class="empty">No matching user submissions.</div>`;
        return;
      }

      filtered.forEach(item => grid.appendChild(card(item, currentSavedIds)));
    }

    async function load() {
      const result = await client
        .from("approved_busta_files")
        .select("*")
        .order("created_at", { ascending: false })
        .limit(80);

      if (result.error) {
        grid.innerHTML = `<div class="empty">Could not load user submissions: ${result.error.message}</div>`;
        return;
      }

      allFiles = result.data || [];
      currentSavedIds = await getSavedIds();

      if (!allFiles.length) {
        grid.innerHTML = `<div class="empty">No user submissions approved yet.</div>`;
        const count = document.getElementById("search-count");
        if (count) count.textContent = "0 results";
        return;
      }

      renderFiles();

      document.getElementById("submission-search")?.addEventListener("input", renderFiles);

      const params = new URLSearchParams(window.location.search);
      const wanted = params.get("file");

      if (wanted) {
        setTimeout(() => {
          const target = Array.from(document.querySelectorAll(".file-card")).find(el => {
            return el.dataset.fileId === wanted || decodeURIComponent(wanted) === el.dataset.fileId;
          });

          if (target) {
            target.scrollIntoView({ behavior: "smooth", block: "center" });
            target.style.outline = "2px solid rgba(216,247,207,0.7)";
            target.style.outlineOffset = "4px";
            setTimeout(() => {
              target.style.outline = "";
              target.style.outlineOffset = "";
            }, 2400);
          }
        }, 400);
      }
    }

    load();
  </script>
</body>
</html>
